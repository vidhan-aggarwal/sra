<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testimonials | SRA Pilates & Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/brand/favicon-64.png" />
  <link rel="apple-touch-icon" href="assets/brand/logo-mark-128.png" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
</head>
<body data-page="testimonials" class="inner-page testimonials-page">
  <header class="site-header" id="site-header"></header>

  <main class="page-main testimonials-main">
    <section class="testimonials-section" id="testimonials-section">
      <div class="testimonials-sticky">
        <h1 class="section-heading">Testimonials</h1>
        <div class="testimonials-panel">
          <div class="testimonial-track" id="testimonial-track"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="testimonial-expanded" id="testimonial-expanded" aria-hidden="true">
    <button type="button" class="testimonial-nav testimonial-nav-prev" aria-label="Previous testimonial" hidden>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>

    <button type="button" class="testimonial-nav testimonial-nav-next" aria-label="Next testimonial">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <div class="testimonial-expanded-panel">
      <div class="testimonial-expanded-image" aria-hidden="true"></div>
      <div class="testimonial-expanded-content">
        <h2 class="testimonial-expanded-name">Client name</h2>
        <p class="testimonial-expanded-text"></p>
      </div>
    </div>
  </div>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="js/nav.js"></script>
  <script src="js/testimonials.js"></script>
</body>
</html>
